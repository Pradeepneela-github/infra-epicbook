trigger:
  branches:
    include:
      - main

pool:
  name: 'Epicbook- Dual Pipelines'   # Using Agent Pool (selfhosted pipeline)

variables:
  TF_VERSION: '1.7.5'
  SERVICE_CONNECTION: 'epicbook-azure-connection'
  BACKEND_RG: 'tfstate-rg'
  BACKEND_SA: 'epicbooktfstate99'
  BACKEND_CONTAINER: 'tfstate'
  BACKEND_KEY: 'epicbook.terraform.tfstate'

stages:
  - stage: InfraProvision
    displayName: Provision Azure Infrastructure with Terraform
    jobs:
      - job: TerraformJob
        displayName: Run Terraform Init Plan Apply
        steps:

          - task: TerraformInstaller@1
            displayName: Install Terraform version $(TF_VERSION)
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: TerraformTaskV4@4
            displayName: Terraform Init - Connect to Azure State Storage
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: $(SERVICE_CONNECTION)
              backendAzureRmResourceGroupName: $(BACKEND_RG)
              backendAzureRmStorageAccountName: $(BACKEND_SA)
              backendAzureRmContainerName: $(BACKEND_CONTAINER)
              backendAzureRmKey: $(BACKEND_KEY)

          - task: TerraformTaskV4@4
            displayName: Terraform Plan - Preview What Will Be Created
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: $(SERVICE_CONNECTION)

          - task: TerraformTaskV4@4
            displayName: Terraform Apply - Create All Azure Resources
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: $(SERVICE_CONNECTION)

          - script: |
              FRONTEND_IP=$(terraform output -raw app_public_ip)
              BACKEND_IP=$(terraform output -raw backend_public_ip)
              BACKEND_PRIVATE=$(terraform output -raw backend_private_ip)
              MYSQL_HOST=$(terraform output -raw mysql_fqdn)
              echo "================================================================"
              echo "INFRASTRUCTURE PROVISIONING COMPLETE"
              echo "================================================================"
              echo "Frontend VM Public IP (users visit this in browser): $FRONTEND_IP"
              echo "Backend VM Public IP  (Ansible connects here):       $BACKEND_IP"
              echo "Backend VM Private IP (Nginx proxy upstream):        $BACKEND_PRIVATE"
              echo "MySQL FQDN            (app DB connection string):    $MYSQL_HOST"
              echo "================================================================"
              echo "COPY ALL FOUR VALUES INTO THE APP PIPELINE VARIABLES BEFORE RUNNING IT"
              echo "================================================================"
            displayName: Print All Terraform Outputs