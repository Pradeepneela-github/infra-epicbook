trigger:
  branches:
    include:
      - main

pool:
  name: 'epicbook-agents'

variables:
  - group: terraform-secrets
  # TF_DIR points to where your .tf files live in the repo.
  # checkout: self clones the repo to $(System.DefaultWorkingDirectory)
  # so this resolves to _work/1/s/terraform/azure on the agent.
  - name: TF_DIR
    value: '$(System.DefaultWorkingDirectory)/terraform/azure'

stages:

  # ============================================================
  # STAGE 1 — Initialize Terraform and connect to remote backend
  # ============================================================
  - stage: TerraformInit
    displayName: 'Terraform Init'
    jobs:
      - job: Init
        displayName: 'Initialize Terraform'
        steps:

          # checkout: self is required in EVERY stage on a self-hosted agent.
          # Without it the workspace directory is empty and terraform cannot
          # find any .tf files, causing "No configuration files" errors.
          - checkout: self

          - bash: |
              export PATH="/opt/homebrew/bin:$PATH"
              echo "Terraform path: $(which terraform)"
              terraform --version
            displayName: 'Verify Terraform is available on agent'

          - bash: |
              export PATH="/opt/homebrew/bin:$PATH"
              cd $(TF_DIR)
              terraform init \
                -backend-config="resource_group_name=epicbook-tfstate-rg" \
                -backend-config="storage_account_name=epicbooktfstate99" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=epicbook.tfstate"
            displayName: 'terraform init — connect to Azure Blob remote backend'
            env:
              ARM_CLIENT_ID: $(servicePrincipalId)
              ARM_CLIENT_SECRET: $(servicePrincipalKey)
              ARM_TENANT_ID: $(tenantId)
              ARM_SUBSCRIPTION_ID: $(subscriptionId)

  # ============================================================
  # STAGE 2 — Plan: show what Terraform will create/change/destroy
  # ============================================================
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    dependsOn: TerraformInit
    jobs:
      - job: Plan
        displayName: 'Generate Terraform Execution Plan'
        steps:

          - checkout: self
          
          - bash: |
              export PATH="/opt/homebrew/bin:$PATH"
              cd $(TF_DIR)
              terraform init \
                -backend-config="resource_group_name=epicbook-tfstate-rg" \
                -backend-config="storage_account_name=epicbooktfstate99" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=epicbook.tfstate"
            displayName: 'terraform init (Plan stage — each stage needs its own init)'
            env:
              ARM_CLIENT_ID: $(servicePrincipalId)
              ARM_CLIENT_SECRET: $(servicePrincipalKey)
              ARM_TENANT_ID: $(tenantId)
              ARM_SUBSCRIPTION_ID: $(subscriptionId)

          - bash: |
              export PATH="/opt/homebrew/bin:$PATH"
              cd $(TF_DIR)
              terraform plan \
                -var="mysql_admin_password=$(MYSQL_ADMIN_PASSWORD)" \
                -out=tfplan
            displayName: 'terraform plan'
            env:
              ARM_CLIENT_ID: $(servicePrincipalId)
              ARM_CLIENT_SECRET: $(servicePrincipalKey)
              ARM_TENANT_ID: $(tenantId)
              ARM_SUBSCRIPTION_ID: $(subscriptionId)

  # ============================================================
  # STAGE 3 — Apply: create the actual Azure resources
  # ============================================================
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    jobs:
      - deployment: Apply
        displayName: 'Apply Terraform Changes to Azure'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:

                - checkout: self

                - bash: |
                    export PATH="/opt/homebrew/bin:$PATH"
                    cd $(TF_DIR)
                    terraform init \
                      -backend-config="resource_group_name=epicbook-tfstate-rg" \
                      -backend-config="storage_account_name=epicbooktfstate99" \
                      -backend-config="container_name=tfstate" \
                      -backend-config="key=epicbook.tfstate"
                  displayName: 'terraform init (Apply stage)'
                  env:
                    ARM_CLIENT_ID: $(servicePrincipalId)
                    ARM_CLIENT_SECRET: $(servicePrincipalKey)
                    ARM_TENANT_ID: $(tenantId)
                    ARM_SUBSCRIPTION_ID: $(subscriptionId)

                - bash: |
                    export PATH="/opt/homebrew/bin:$PATH"
                    cd $(TF_DIR)
                    terraform apply \
                      -auto-approve \
                      -var="mysql_admin_password=$(MYSQL_ADMIN_PASSWORD)"
                  displayName: 'terraform apply'
                  env:
                    ARM_CLIENT_ID: $(servicePrincipalId)
                    ARM_CLIENT_SECRET: $(servicePrincipalKey)
                    ARM_TENANT_ID: $(tenantId)
                    ARM_SUBSCRIPTION_ID: $(subscriptionId)

                - bash: |
                    export PATH="/opt/homebrew/bin:$PATH"
                    cd $(TF_DIR)

                    APP_IP=$(terraform output -raw app_public_ip)
                    BACKEND_IP=$(terraform output -raw backend_private_ip)
                    MYSQL_FQDN=$(terraform output -raw mysql_fqdn)

                    echo ""
                    echo "========================================="
                    echo "  TERRAFORM OUTPUTS — Copy these values"
                    echo "  into your App Pipeline variables"
                    echo "========================================="
                    echo "  app_public_ip:      $APP_IP"
                    echo "  backend_private_ip: $BACKEND_IP"
                    echo "  mysql_fqdn:         $MYSQL_FQDN"
                    echo "========================================="

                    echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$APP_IP"
                    echo "##vso[task.setvariable variable=BACKEND_PRIVATE_IP;isOutput=true]$BACKEND_IP"
                    echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$MYSQL_FQDN"
                  displayName: 'Capture and Display Terraform Outputs'
                  name: TerraformOutputs
                  env:
                    ARM_CLIENT_ID: $(servicePrincipalId)
                    ARM_CLIENT_SECRET: $(servicePrincipalKey)
                    ARM_TENANT_ID: $(tenantId)
                    ARM_SUBSCRIPTION_ID: $(subscriptionId)